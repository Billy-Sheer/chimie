<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>HNO₃ – Exercice formatif</title>
  <style>
  body {
    font-family: Calibri, "Segoe UI", Arial, sans-serif;
    font-size: 16px;
  }

  input, button {
    font-family: Calibri, "Segoe UI", Arial, sans-serif;
    font-size: 16px;
  }
</style>
</head>

<body>

<h2>HNO₃ – Diagramme de Lewis (formatif 5)</h2>

<p>
Dessinez la <strong>structure de Lewis la plus plausible</strong> pour HNO₃.
</p>

<!-- Éditeur Ketcher auto-hébergé -->
<div id="ketcher-container">
  <iframe
    id="ketcherFrame"
    src="ketcher/index.html"
    width="600"
    height="400"
    style="border:1px solid #000;"
  ></iframe>
</div>

<br><br>

<p>
Combien de <strong>doublets libres</strong> y a-t-il sur l’atome d’azote (N) ?
</p>

<input
  type="number"
  id="doubletsN"
  min="0"
  max="4"
  style="width:60px;"
>

<br><br>

<button onclick="verifier()">Vérifier</button>

<div
  id="feedback"
  style="margin-top:15px; font-weight:bold;">
</div>

<script>
function verifier() {

  const feedback = document.getElementById("feedback");

  // ============================
  // 1) Vérification des doublets (raisonnement)
  // ============================

  const doublets = parseInt(
    document.getElementById("doubletsN").value,
    10
  );

  if (isNaN(doublets)) {
    feedback.innerText =
      "❌ Indique le nombre de doublets libres sur l’atome d’azote.";
    return;
  }

  if (doublets !== 0) {
    feedback.innerText =
      "❌ Pour la structure la plus plausible de HNO₃, l’azote ne possède aucun doublet libre.";
    return;
  }

  // ============================
  // 2) Vérification de la structure Ketcher
  // ============================

  const ketcher = document
    .getElementById('ketcherFrame')
    .contentWindow
    .ketcher;

  ketcher.getMolfile().then(mol => {

    const nbN = (mol.match(/\sN\s/g) || []).length;
    const nbO = (mol.match(/\sO\s/g) || []).length;

    if (nbN !== 1 || nbO !== 3) {
      feedback.innerText =
        "❌ Vérifie la présence de 1 atome d’azote et 3 atomes d’oxygène.";
      return;
    }

    // Test oxoacide : O–H (hydrogène implicite accepté)
ketcher.getSmiles().then(smiles => {

  // Vérification oxoacide : présence d'un OH
  if (!smiles.includes("O") || !smiles.includes("H")) {
    feedback.innerText =
      "❌ HNO₃ est un oxoacide : l’hydrogène doit être lié à un oxygène.";
    return;
  }

  // ✅ Tout est cohérent
  feedback.innerText =
    "✅ Structure plausible et raisonnement correct pour HNO₃.";
});

    // ✅ Tout est cohérent
    feedback.innerText =
      "✅ Structure plausible et raisonnement correct pour HNO₃.";
  });
}
</script>

</body>
</html>
