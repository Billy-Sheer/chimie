<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>HNO₃ – Diagramme de Lewis</title>

  <!-- ChemDoodle Web Components (local, v11+) -->
  <link rel="stylesheet" href="ChemDoodleWeb.css">
  <script src="ChemDoodleWeb.js"></script>
</head>

<body>

<h2>HNO₃ – Diagramme de Lewis 2000 (formatif)</h2>

<!-- ✅ L’éditeur est un CANVAS -->
<canvas id="editor"
        width="600"
        height="400"
        style="border:1px solid #000;"></canvas>

<br><br>

<button onclick="verifier()">Vérifier</button>
<div id="feedback"></div>

<script>
  // ✅ API CORRECTE POUR LES VERSIONS ACTUELLES
  window.editor = new ChemDoodle.EditorCanvas(
    'editor',
    600,
    400
  );

  function verifier() {
    document.getElementById("feedback").innerText =
      "✅ L’éditeur fonctionne. Clique dans le rectangle et dessine.";
  }
</script>

</body>
</html>
