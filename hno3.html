<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>HNO₃ – Diagramme de Lewis</title>

  <!-- ChemDoodle Web Components (local, sans UIS) -->
  <link rel="stylesheet" href="ChemDoodleWeb.css">
  <script src="ChemDoodleWeb.js"></script>
</head>

<body>

<h2>HNO₃ – Diagramme de Lewis 1000 (formatif)</h2>

<canvas id="sketcher"
        width="600"
        height="400"
        style="border:1px solid #000;"></canvas>

<br><br>

<button onclick="verifier()">Vérifier</button>
<div id="feedback"></div>

<script>
  // ✅ API STABLE ET DOCUMENTÉE
  window.sketcher = new ChemDoodle.SketcherCanvas(
    'sketcher',
    600,
    400
  );

  function verifier() {
    document.getElementById("feedback").innerText =
      "✅ Sketcher actif. Clique dans le rectangle puis tape C, O, N…";
  }
</script>

</body>
