<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>HNO₃ – Diagramme de Lewis</title>

  <!-- ChemDoodle Web Components -->
  <link rel="stylesheet"
        href="https://unpkg.com/chemdoodle@9.5.0/build/chemdoodle.css">

  <script src="https://unpkg.com/chemdoodle@9.5.0/build/chemdoodle.js"></script>
</head>

<body>

<h2>HNO₃ – Diagramme de Lewis (formatif)</h2>

<!-- Barre d’outils -->
<div id="toolbar"></div>

<!-- Zone de dessin -->
<canvas id="sketcherCanvas" width="600" height="400"
        style="border:1px solid #ccc;"></canvas>

<br><br>

<button onclick="verifier()">Vérifier</button>
<div id="feedback"></div>

<script>
  // Création du sketcher
  var sketcher = new ChemDoodle.SketcherCanvas(
    'sketcherCanvas',
    600,
    400
  );

  // Création de la barre d’outils (INDISPENSABLE)
  var toolbar = new ChemDoodle.SketcherToolbar(
    'toolbar',
    sketcher
  );

  function verifier() {
    document.getElementById("feedback").innerHTML =
      "✅ Le sketcher ChemDoodle fonctionne.";
  }
</script>

</body>
</html>
