  <meta charset="UTF-8">
  <title>HNO₃ – Diagramme de Lewis</title>

  <link rel="stylesheet"
        href="https://unpkg.com/chemdoodle@9.5.0/build/chemdoodle.css">

</head>
``

<body>

<h2>HNO₃ – Diagramme de Lewis (formatif)</h2>

<div id="toolbar"></div>

<canvas id="sketcherCanvas"
        width="600"
        height="400"
        style="border:1px solid #ccc;"></canvas>

<br><br>

<button onclick="verifier()">Vérifier</button>
<div id="feedback"></div>

<script>
  // Vérification que ChemDoodle est bien chargé
  if (typeof ChemDoodle === "undefined") {
    document.getElementById("feedback").innerHTML =
      "❌ ChemDoodle n’est pas chargé.";
  }

  // Création du sketcher
  var sketcher = new ChemDoodle.SketcherCanvas(
    'sketcherCanvas',
    600,
    400
  );

  // Barre d’outils (INDISPENSABLE)
  var toolbar = new ChemDoodle.SketcherToolbar(
    'toolbar',
    sketcher
  );

  function verifier() {
    document.getElementById("feedback").innerHTML =
      "✅ ChemDoodle est chargé et le sketcher fonctionne.";
  }
</script>

</body>
</html>
