<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>HNO₃ – Diagramme de Lewis</title>

  <link rel="stylesheet"
        href="https://unpkg.com/chemdoodle@9.5.0/build/chemdoodle.css">

  <script src="https://unpkg.com/chemdoodle@9.5.0/build/chemdoodle.js"></script>
</head>

<body>

<h2>HNO₃ – Diagramme de Lewis (formatif)</h2>

<canvas id="sketcherCanvas" width="600" height="400"
        style="border:1px solid #ccc;"></canvas>

<br><br>

<button onclick="verifier()">Vérifier</button>
<div id="feedback"></div>

<script>
  // Création du sketcher
  var sketcher = new ChemDoodle.SketcherCanvas(
    'sketcherCanvas',
    600,
    400
  );

  // Afficher explicitement la barre d’outils
  sketcher.toolbarShown = true;

  // Style adapté aux Lewis
  sketcher.styles.atoms_displayTerminalCarbonLabels = true;
  sketcher.styles.atoms_useJMOLColors = true;

  // Forcer l’affichage
  sketcher.repaint();

  function verifier() {
    document.getElementById("feedback").innerHTML =
      "✅ Le sketcher ChemDoodle est actif.";
  }
</script>

</body>
</html>
