<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Diagramme de Lewis – Exercice formatif</title>

  <style>
    body {
      font-family: Calibri, "Segoe UI", Arial, sans-serif;
      font-size: 16px;
    }
    input, button {
      font-family: inherit;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h2 id="titre"></h2>
<p id="consigne"></p>

<!-- KETCHER AUTO-HÉBERGÉ -->
<div id="ketcher-container">
  <iframe
    id="ketcherFrame"
    src="ketcher/index.html"
    width="600"
    height="400"
    style="border:1px solid #000;"
  ></iframe>
</div>

<br><br>

<p id="question-doublets"></p>
<input type="number" id="doubletsCentral" min="0" max="6" style="width:60px;">

<br><br>
<button onclick="verifier()">Vérifier</button>

<div id="feedback" style="margin-top:15px; font-weight:bold;"></div>

<script>
/* ===============================
   PARAMÈTRE MOLÉCULE
   =============================== */
const params = new URLSearchParams(window.location.search);
const molecule = params.get("mol") || "HNO3";

/* ===============================
   RÈGLES
   =============================== */
const regles = {
  NH3: {
    nom: "NH₃",
    atomes: { N:1, H:3 },
    doubletsCentral: 1,
    consigne: "Dessinez la structure de Lewis la plus plausible pour NH₃.",
    question: "Combien de doublets libres y a‑t‑il sur l’atome d’azote (N) ?"
  },
  HNO3: {
    nom: "HNO₃",
    atomes: { H:1, N:1, O:3 },
    doubletsCentral: 0,
    consigne: "Dessinez la structure de Lewis la plus plausible pour HNO₃.",
    question: "Combien de doublets libres y a‑t‑il sur l’atome d’azote (N) ?"
  }
};

const cible = regles[molecule];
document.getElementById("titre").innerText =
  cible.nom + " – Diagramme de Lewis (formatif)";
document.getElementById("consigne").innerText = cible.consigne;
document.getElementById("question-doublets").innerText = cible.question;

/* ===============================
   FONCTION PRINCIPALE
   =============================== */
function verifier() {
  const feedback = document.getElementById("feedback");

  const doublets = parseInt(
    document.getElementById("doubletsCentral").value, 10
  );

  if (isNaN(doublets)) {
    feedback.innerText =
      "❌ Indique le nombre de doublets libres sur l’atome central.";
    return;
  }

  if (doublets !== cible.doubletsCentral) {
    feedback.innerText =
      "❌ Nombre de doublets incorrect.";
    return;
  }

  const ketcher =
    document.getElementById("ketcherFrame").contentWindow.ketcher;

  ketcher.getMolfile().then(mol => {

    /* --- 1) Plusieurs molécules --- */
    if (compterMolecules(mol) > 1) {
      feedback.innerText =
        "❌ Le dessin contient plusieurs molécules non reliées.";
      return;
    }

    /* --- 2) Lecture des atomes --- */
    const lignes = mol.split("\n");
    const counts = lignes[3].trim().split(/\s+/);
    const nbAtomes = parseInt(counts[0], 10);

    const atomesPresents = [];
    for (let i = 0; i < nbAtomes; i++) {
      const p = lignes[4 + i].trim().split(/\s+/);
      atomesPresents.push(p[3]);
    }

    const atomesAutorises = Object.keys(cible.atomes);

    const interdits = atomesPresents.filter(
      el => !atomesAutorises.includes(el)
    );

    if (interdits.length > 0) {
      feedback.innerText =
        "❌ Atome(s) non approprié(s) : " +
        [...new Set(interdits)].join(", ");
      return;
    }

    /* --- 3) Quantités d’atomes (H explicites) --- */
    for (let el of atomesAutorises) {
      const nb = atomesPresents.filter(x => x === el).length;
      const attendu = cible.atomes[el];

      if (el === "H" && nb < attendu) {
        feedback.innerText =
          "❌ Les hydrogènes doivent être dessinés explicitement " +
          "(liaisons avec H visibles).";
        return;
      }

      if (nb !== attendu) {
        feedback.innerText =
          "❌ Nombre incorrect d’atomes " + el +
          " (attendu : " + attendu + ").";
        return;
      }
    }

    /* --- 4) Trappe spécifique HNO3 : exactement un OH --- */
    if (molecule === "HNO3") {
      const nbOH = compterGroupesOH(mol);
      if (nbOH !== 1) {
        feedback.innerText =
          "❌ HNO₃ doit contenir un seul groupe OH.";
        return;
      }
    }

    feedback.innerText =
      "✅ Structure plausible et raisonnement correct.";
  });
}

/* ===============================
   OUTILS
   =============================== */
function compterMolecules(mol) {
  const lignes = mol.split("\n");
  const counts = lignes[3].trim().split(/\s+/);
  const nbAtomes = parseInt(counts[0], 10);
  const nbLiaisons = parseInt(counts[1], 10);

  const voisins = {};
  for (let i = 1; i <= nbAtomes; i++) voisins[i] = [];

  const debut = 4 + nbAtomes;
  for (let i = 0; i < nbLiaisons; i++) {
    const p = lignes[debut + i].trim().split(/\s+/);
    const a = parseInt(p[0], 10);
    const b = parseInt(p[1], 10);
    voisins[a].push(b);
    voisins[b].push(a);
  }

  const vus = new Set();
  let composantes = 0;

  for (let i = 1; i <= nbAtomes; i++) {
    if (!vus.has(i)) {
      composantes++;
      const pile = [i];
      while (pile.length) {
        const x = pile.pop();
        if (vus.has(x)) continue;
        vus.add(x);
        voisins[x].forEach(v => {
          if (!vus.has(v)) pile.push(v);
        });
      }
    }
  }
  return composantes;
}

function compterGroupesOH(mol) {
  const lignes = mol.split("\n");
  const counts = lignes[3].trim().split(/\s+/);
  const nbAtomes = parseInt(counts[0], 10);
  const nbLiaisons = parseInt(counts[1], 10);

  const symboles = {};
  for (let i = 0; i < nbAtomes; i++) {
    const p = lignes[4 + i].trim().split(/\s+/);
    symboles[i + 1] = p[3];
  }

  let nbOH = 0;
  const debut = 4 + nbAtomes;
  for (let i = 0; i < nbLiaisons; i++) {
    const p = lignes[debut + i].trim().split(/\s+/);
    const a = parseInt(p[0], 10);
    const b = parseInt(p[1], 10);
    if (
      (symboles[a] === "O" && symboles[b] === "H") ||
      (symboles[a] === "H" && symboles[b] === "O")
    ) {
      nbOH++;
    }
  }
  return nbOH;
}
</script>

</body>
</html>
