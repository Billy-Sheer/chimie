<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Dessin de Lewis – Générique</title>

  <style>
    body {
      font-family: Calibri, "Segoe UI", Arial, sans-serif;
      font-size: 16px;
    }
    #feedback {
      margin-top: 10px;
      font-weight: bold;
    }
    button {
      margin-top: 10px;
      padding: 6px 12px;
      font-family: inherit;
    }
  </style>

  <!-- ✅ ICI : TU LAISSES EXACTEMENT LES <script> KETCHER QUE TU AVAIS AVANT -->
  <!-- ex : <script src="...cript> -->
</head>

<body>

<h2 id="titre"></h2>

<!-- ✅ ICI : TON DIV KETCHER EXISTANT -->
<div id="ketcher" style="width:600px; height:400px;"></div>

<button onclick="valider()">Valider la structure</button>

<div id="feedback"></div>

<script>
/* =====================================================
   1. MOLÉCULE DEMANDÉE (NOUVEAU)
   ===================================================== */
const params = new URLSearchParams(window.location.search);
const molecule = params.get("mol") || "HNO3";

document.getElementById("titre").innerText =
  "Dessinez la structure de Lewis de " + molecule;

/* =====================================================
   2. RÈGLES (NOUVEAU, MAIS SIMPLE)
   ===================================================== */
const regles = {
  HNO3: {
    atomes: { H:1, N:1, O:3 },
    central: "N"
  },
  NH3: {
    atomes: { N:1, H:3 },
    central: "N"
  }
  // CO2, SO4, etc. plus tard
};

/* =====================================================
   3. VALIDATION (TRÈS PROCHE DE TON CODE ACTUEL)
   ===================================================== */
async function valider() {
  const feedback = document.getElementById("feedback");
  feedback.innerText = "";

  const cible = regles[molecule];
  if (!cible) {
    feedback.innerText = "Molécule non configurée.";
    return;
  }

  // ✅ LIGNE QUE TU UTILISAIS DÉJÀ
  const mol = await ketcher.getMolfile();

  try {
    verifierAtomes(mol, cible.atomes);
    verifierAtomeCentral(mol, cible.central);
    feedback.innerText = "✅ Structure correcte";
  } catch (err) {
    feedback.innerText = err;
  }
}

/* =====================================================
   4. FONCTIONS RÉUTILISABLES
   ===================================================== */
function verifierAtomes(mol, atomes) {
  for (let el in atomes) {
    const nb = (mol.match(new RegExp("\\s" + el + "\\s", "g")) || []).length;
    if (nb !== atomes[el]) {
      throw "❌ Nombre incorrect d’atomes " + el;
    }
  }
}

function verifierAtomeCentral(mol, symboleCentral) {
  const lignes = mol.split("\n");
  const types = {};
  const connexions = {};
  let index = 1;

  for (let ligne of lignes) {
    const p = ligne.trim().split(/\s+/);

    // lignes atomes
    if (p.length >= 4 && isNaN(p[0])) {
      types[index++] = p[3];
    }

    // lignes liaisons
    if (p.length >= 3 && !isNaN(p[0]) && !isNaN(p[1])) {
      connexions[p[0]] = (connexions[p[0]] || 0) + 1;
      connexions[p[1]] = (connexions[p[1]] || 0) + 1;
    }
  }

  let centre = Object.keys(connexions)
    .reduce((a,b)=> connexions[a] > connexions[b] ? a : b);

  if (types[centre] !== symboleCentral) {
    throw "❌ L’atome central est incorrect.";
  }
}
</script>

</body>
</html>
