<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>NH₃ – Géométrie pyramidale (JSmol)</title>

  <style>
    body {
      font-family: Calibri, "Segoe UI", Arial, sans-serif;
      font-size: 16px;
    }
  </style>

  <!-- ✅ CHARGEMENT CANONIQUE DE JSmol -->
  <script src="https://chemapps.stolaf.edu/jmol/jsmol/JSmol.min.js"></script>
</head>

<body>

<h2>NH₃ – Géométrie pyramidale</h2>
<p>Faites tourner la molécule pour observer la géométrie.</p>

<script type="text/javascript">
  var Info = {
    width: 400,
    height: 400,
    use: "HTML5",
    j2sPath: "https://chemapps.stolaf.edu/jmol/jsmol/j2s",
    script: "load inline \"NH3\nJSmol\n\n 4 3  0  0  0  0  0  0  0  0  1 V2000\n    0.0000    0.0000    0.2000 N\n    0.9400    0.0000   -0.3000 H\n   -0.4700    0.8140   -0.3000 H\n   -0.4700   -0.8140   -0.3000 H\n  1 2 1\n  1 3 1\n  1 4 1\nM  END\"; " +
            "spacefill off; wireframe off; ballstick on; color atoms; show hydrogens;"
  };

  document.write(Jmol.getAppletHtml("nh3Applet", Info));
</script>

</body>
</html>
