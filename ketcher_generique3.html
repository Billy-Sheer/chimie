<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Dessin de Lewis – Générique</title>

  <!-- Police -->
  <style>
    body {
      font-family: Calibri, "Segoe UI", Arial, sans-serif;
      font-size: 16px;
    }

    #feedback {
      margin-top: 10px;
      font-weight: bold;
    }

    button {
      margin-top: 10px;
      padding: 6px 12px;
      font-family: inherit;
    }
  </style>

  <!-- Ketcher Standalone -->
  <script src="https://unpkg.com/ketcher-standalone@2.8.0/dist/ketcher.min.js"></script>
</head>

<body>

<h2 id="titre"></h2>

<div id="ketcher" style="width:600px; height:400px;"></div>

<button onclick="valider()">Valider la structure</button>

<div id="feedback"></div>

<script>
/* ===============================
   1. PARAMÈTRE DE MOLÉCULE
   =============================== */

const params = new URLSearchParams(window.location.search);
const molecule = params.get("mol") || "HNO3";

document.getElementById("titre").innerText =
  "Dessinez la structure de Lewis de " + molecule;

/* ===============================
   2. RÈGLES PAR MOLÉCULE
   =============================== */

const regles = {
  HNO3: {
    atomes: { H: 1, N: 1, O: 3 },
    central: "N"
  }
};

/* ===============================
   3. INITIALISATION KETCHER ✅
   =============================== */

let ketcher;

window.addEventListener("load", async () => {
  ketcher = await window.KetcherStandalone.create(
    document.getElementById("ketcher")
  );
});

/* ===============================
   4. VALIDATION
   =============================== */

async function valider() {
  const feedback = document.getElementById("feedback");
  feedback.innerText = "";

  const cible = regles[molecule];
  if (!cible) {
    feedback.innerText = "Molécule non définie.";
    return;
  }

  const mol = await ketcher.getMolfile();

  try {
    verifierAtomes(mol, cible.atomes);
    verifierAtomeCentral(mol, cible.central);
    feedback.innerText = "✅ Structure correcte";
  } catch (err) {
    feedback.innerText = err;
  }
}

/* ===============================
   5. VALIDATEURS
   =============================== */

function verifierAtomes(mol, atomesAttendus) {
  for (let symbole in atomesAttendus) {
    const regex = new RegExp("\\s" + symbole + "\\s", "g");
    const nb = (mol.match(regex) || []).length;
    if (nb !== atomesAttendus[symbole]) {
      throw "❌ Nombre incorrect d’atomes " + symbole;
    }
  }
}

function verifierAtomeCentral(mol, symboleCentral) {
  const lignes = mol.split("\n");
  const types = {};
  const connexions = {};
  let index = 1;

  for (let ligne of lignes) {
    const p = ligne.trim().split(/\s+/);

    if (p.length >= 4 && isNaN(p[0])) {
      types[index] = p[3];
      index++;
    }

    if (p.length >= 3 && !isNaN(p[0]) && !isNaN(p[1])) {
      connexions[p[0]] = (connexions[p[0]] || 0) + 1;
      connexions[p[1]] = (connexions[p[1]] || 0) + 1;
    }
  }

  let max = 0;
  let centre = null;
  for (let i in connexions) {
    if (connexions[i] > max) {
      max = connexions[i];
      centre = i;
    }
  }

  if (types[centre] !== symboleCentral) {
    throw "❌ L’atome central est incorrect.";
  }
}
</script>

</body>
</html>
