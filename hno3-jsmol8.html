<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>HNO₃ – Représentation tridimensionnelle</title>

  <!-- Police -->
  <style>
    body {
      font-family: Calibri, "Segoe UI", Arial, sans-serif;
      font-size: 16px;
    }
  </style>

  <!-- JSmol -->
  <script src="https://chemapps.stolaf.edu/jmol/jsmol/JSmol.min.js"></script>
</head>

<body>

<h2>HNO₃ – Représentation tridimensionnelle</h2>
<p>Faites tourner la molécule pour observer la géométrie.</p>

<div id="jsmol">
<script>
  var Info = {
    width: 400,
    height: 400,
    use: "HTML5",
    j2sPath: "https://chemapps.stolaf.edu/jmol/jsmol/j2s",
    script:
      "load smiles \"O=[N+](O)[O-]\";" +
      "spacefill off;" +
      "wireframe off;" +
      "ballstick on;" +
      "color atoms;" +
      "show hydrogens;" +
      "set antialiasDisplay true;"
  };

  document.write(Jmol.getAppletHtml("jsmolApplet", Info));
</script>
</div>

</body>
</html>
