<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Dessin de Lewis – Générique</title>

  <style>
    body {
      font-family: Calibri, "Segoe UI", Arial, sans-serif;
      font-size: 16px;
    }
    #feedback {
      margin-top: 10px;
      font-weight: bold;
    }
    button {
      margin-top: 10px;
      padding: 6px 12px;
      font-family: inherit;
    }
    iframe {
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>

<h2 id="titre"></h2>

<iframe
  id="ketcherFrame"
  src="https://unpkg.com/ketcher-standalone@2.8.0/dist/index.html"
  width="600"
  height="400">
</iframe>

<br>

<button onclick="valider()">Valider la structure</button>

<div id="feedback"></div>

<script>
/* ===============================
   PARAMÈTRE MOLÉCULE
   =============================== */
const params = new URLSearchParams(window.location.search);
const molecule = params.get("mol") || "HNO3";

document.getElementById("titre").innerText =
  "Dessinez la structure de Lewis de " + molecule;

/* ===============================
   RÈGLES
   =============================== */
const regles = {
  HNO3: {
    atomes: { H:1, N:1, O:3 },
    central: "N"
  }
};

/* ===============================
   VALIDATION
   =============================== */
async function valider() {
  const feedback = document.getElementById("feedback");
  feedback.innerText = "";

  const frame = document.getElementById("ketcherFrame");

  if (!frame.contentWindow.ketcher) {
    feedback.innerText = "Ketcher n’est pas encore prêt.";
    return;
  }

  const mol = await frame.contentWindow.ketcher.getMolfile();
  const cible = regles[molecule];

  try {
    verifierAtomes(mol, cible.atomes);
    verifierAtomeCentral(mol, cible.central);
    feedback.innerText = "✅ Structure correcte";
  } catch (err) {
    feedback.innerText = err;
  }
}

/* ===============================
   VALIDATEURS
   =============================== */
function verifierAtomes(mol, atomes) {
  for (let el in atomes) {
    const nb = (mol.match(new RegExp("\\s" + el + "\\s", "g")) || []).length;
    if (nb !== atomes[el]) {
      throw "❌ Nombre incorrect d’atomes " + el;
    }
  }
}

function verifierAtomeCentral(mol, symboleCentral) {
  const lignes = mol.split("\n");
  const types = {};
  const connexions = {};
  let index = 1;

  for (let l of lignes) {
    const p = l.trim().split(/\s+/);

    if (p.length >= 4 && isNaN(p[0])) {
      types[index++] = p[3];
    }

    if (p.length >= 3 && !isNaN(p[0]) && !isNaN(p[1])) {
      connexions[p[0]] = (connexions[p[0]] || 0) + 1;
      connexions[p[1]] = (connexions[p[1]] || 0) + 1;
    }
  }

  let centre = Object.keys(connexions)
    .reduce((a,b)=> connexions[a] > connexions[b] ? a : b);

  if (types[centre] !== symboleCentral) {
    throw "❌ L’atome central est incorrect.";
  }
}
</script>

</body>
</html>
